name: fitos
description: FitOS — App de rastreamento de treinos offline. Flutter + Hive + Riverpod.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Estado
  flutter_riverpod: ^2.5.1
  # Banco local offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Gráficos
  fl_chart: ^0.68.0
  # Export para Obsidian (iOS share sheet)
  share_plus: ^9.0.0
  # Formatação de datas (yyyy-MM-dd compatível com vault)
  intl: ^0.19.0
  # UUIDs para IDs únicos
  uuid: ^4.3.3
  # Caminho para diretório de documentos
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Geração de adaptadores Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  # Mocks para unit + widget tests
  mocktail: ^1.0.3
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
